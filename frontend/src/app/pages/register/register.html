<div class="auth-container" *transloco="let t">
  <h2>{{ t('auth.registerTitle') }}</h2>
  <form (ngSubmit)="onRegister()">
    <input type="email" [(ngModel)]="email" name="email" [placeholder]="t('auth.email')" required />
    <input type="text" [(ngModel)]="username" name="username" [placeholder]="t('auth.username')" required />
    <div class="password-input-wrapper">
      <input 
        [type]="showPassword ? 'text' : 'password'" 
        [(ngModel)]="password" 
        name="password" 
        [placeholder]="t('auth.password')" 
        required 
      />
      <button 
        type="button" 
        class="password-toggle-btn" 
        (click)="togglePasswordVisibility()"
        [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
      >
        <lucide-icon [img]="showPassword ? EyeOffIcon : EyeIcon" [size]="20"></lucide-icon>
      </button>
    </div>
    <button type="submit">{{ t('auth.registerBtn') }}</button>
    <div class="error" *ngIf="error">{{ error }}</div>
  </form>
  <a routerLink="/login">{{ t('auth.hasAccount') }}</a>
</div>
