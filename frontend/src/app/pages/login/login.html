<div class="auth-container" *transloco="let t">
  <h2>{{ t('auth.loginTitle') }}</h2>
  <form (ngSubmit)="onLogin()">
    <input type="email" [(ngModel)]="email" name="email" [placeholder]="t('auth.email')" required />
    <input type="password" [(ngModel)]="password" name="password" [placeholder]="t('auth.password')" required />
    <button type="submit">{{ t('auth.loginBtn') }}</button>
    <div class="error" *ngIf="error">{{ error }}</div>
  </form>
  <a routerLink="/register">{{ t('auth.noAccount') }}</a>
</div>
