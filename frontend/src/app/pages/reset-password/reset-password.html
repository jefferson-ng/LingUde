<div class="auth-container">
  <h2>Reset Password</h2>

  <div *ngIf="!token" class="error-box">
    Invalid reset link. Please request a new password reset.
    <a routerLink="/forgot-password">Request new link</a>
  </div>

  <div *ngIf="token && !success">
    <p class="info">Enter your new password below.</p>

    <form (ngSubmit)="onSubmit()">
      <input
        type="password"
        [(ngModel)]="newPassword"
        name="newPassword"
        placeholder="New Password"
        required
        [disabled]="loading"
      />
      <div class="hint" *ngIf="newPassword && !passwordValid">
        Password must be at least 8 characters
      </div>

      <input
        type="password"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        placeholder="Confirm Password"
        required
        [disabled]="loading"
      />
      <div class="hint" *ngIf="confirmPassword && !passwordsMatch">
        Passwords do not match
      </div>

      <button type="submit" [disabled]="!canSubmit">
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>

      <div class="error" *ngIf="error">{{ error }}</div>
    </form>
  </div>

  <div *ngIf="success" class="success-box">
    <div class="success">{{ message }}</div>
    <p>You can now log in with your new password.</p>
    <a routerLink="/login" class="login-link">Go to Login</a>
  </div>
</div>
