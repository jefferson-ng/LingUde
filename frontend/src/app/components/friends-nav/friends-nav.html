<ng-container *transloco="let t">
  <!-- Page Header with Share Button -->
  <div class="friends-page-header">
    <div class="friends-header-content">
      <h1 class="friends-page-title">{{ t('friends.title') }}</h1>
      <p class="friends-page-subtitle">{{ t('friends.subtitle') }}</p>
    </div>
    <app-share-button></app-share-button>
  </div>

  <nav class="friends-nav">

    <!-- Friends Tab -->
    <a
      routerLink="/friends"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{exact: true}"
      class="nav-tab"
    >
      <!-- Users Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
      <span>{{ t('friends.nav.myFriends') }}</span>
    </a>

    <!-- Requests Tab -->
    <a
      routerLink="/friends/requests"
      routerLinkActive="active"
      class="nav-tab"
    >
      <!-- User Plus Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <line x1="19" y1="8" x2="19" y2="14"></line>
        <line x1="22" y1="11" x2="16" y2="11"></line>
      </svg>
      <span>{{ t('friends.nav.friendRequests') }}</span>

      <!-- Badge (only show if count > 0) -->
      @if (requestCount() > 0) {
        <span class="request-badge">{{ requestCount() }}</span>
      }
    </a>

    <!-- Search Tab -->
    <a
      routerLink="/friends/search"
      routerLinkActive="active"
      class="nav-tab"
    >
      <!-- Search Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <span>{{ t('friends.nav.searchUsers') }}</span>
    </a>

  </nav>
</ng-container>
