<ng-container *transloco="let t">
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="user-profile">
          <div class="user-avatar">{{ userName().charAt(0) }}</div>
          <div class="user-info">
            <span class="user-name">{{ userName() }}</span>
            <span class="user-level">{{ t('user.level') }} {{ userLevel() }} • {{ userXP() }} {{ t('user.xp') }}</span>
          </div>
        </div>
        
      </div>

      <nav class="nav-menu">
        @for (item of navItems; track item.path) {
          <a 
            [routerLink]="item.path" 
            routerLinkActive="active"
            class="nav-item"
          >
            <span class="nav-icon">{{ item.icon }}</span>
            <span class="nav-label">{{ t(item.translationKey) }}</span>
          </a>
        }
      </nav>
    </aside>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Header -->
      <header class="app-header">
        <h2 class="page-title">{{ t('app.title') }}</h2>
        
        <!-- XP Counter in Header -->
        <div class="header-actions">
          <div class="xp-counter" title="Experience Points">
            <span class="xp-icon">⭐</span>
            <span class="xp-value">{{ userXP() }}</span>
            <span class="xp-label">XP</span>
          </div>
          
          <button class="settings-button" [routerLink]="'/settings'" [title]="t('app.settings')">
            <span class="settings-icon">⚙️</span>
          </button>
        </div>
      </header>

      <!-- Router Outlet - Content changes here -->
      <main class="content">
        <router-outlet />
      </main>
    </div>
  </div>
</ng-container>
