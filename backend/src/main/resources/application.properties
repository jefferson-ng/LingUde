# psql -U sep -d sep
spring.application.name=sep-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sep}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sep}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sep}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:3F4428472B4B6250655368566D5971337336763979244226452948404D635166}
# Access token: 30 minutes (1800000 ms)
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:1800000}
# Refresh token: 7 days (604800000 ms)
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# --- Flyway configuration ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# --- Mail (MailHog SMTP) ---
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}

# App config for reset link (frontend later, but we need a URL now)
app.reset.base-url=${APP_RESET_BASE_URL:http://localhost:4200/reset-password}
