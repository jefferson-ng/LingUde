# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# --- Flyway configuration ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# --- Google Gemini AI Configuration ---
google.gemini.api-key=${GOOGLE_GEMINI_API_KEY:your-api-key-here}
google.gemini.model=${GOOGLE_GEMINI_MODEL:gemini-2.0-flash-exp}
google.gemini.temperature=${GOOGLE_GEMINI_TEMPERATURE:0.7}
google.gemini.max-tokens=${GOOGLE_GEMINI_MAX_TOKENS:2048}

# AI Feature Flags
ai.chat.enabled=${AI_CHAT_ENABLED:true}
ai.exercise-generation.enabled=${AI_EXERCISE_GENERATION_ENABLED:false}
