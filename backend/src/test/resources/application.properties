# --- Test database: in-memory H2, Postgres compatibility ---
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sep
spring.datasource.password=sep
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

#--- JWT configuration for tests ---

# JWT Configuration
jwt.secret=${JWT_SECRET:3F4428472B4B6250655368566D5971337336763979244226452948404D635166}
# Access token: 30 minutes (1800000 ms)
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:1800000}
# Refresh token: 7 days (604800000 ms)
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Tests use H2, but our Flyway migrations are Postgres-specific.
# So we disable Flyway only for tests to avoid SQL syntax errors.
spring.flyway.enabled=false

# Let Hibernate create the schema for tests automatically.
spring.jpa.hibernate.ddl-auto=create-drop

# Optional: reduce noise in test logs
logging.level.org.flywaydb=OFF
